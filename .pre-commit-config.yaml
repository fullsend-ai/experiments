repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
        exclude: "internal/layers/secrets_test\\.go$|internal/security/scanner_test\\.go$|tests/.*test_.*\\.py$"
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uvx ty check . --ignore unresolved-import --ignore unresolved-attribute
        language: system
        types: [python]
        pass_filenames: false

      - id: lint-experiment-numbers
        name: lint experiment numbers
        entry: ./hack/lint-experiment-numbers
        language: script
        files: ^[0-9]{4}-
        pass_filenames: false

      - id: lint-experiment-frontmatter
        name: lint experiment frontmatter
        entry: ./hack/lint-experiment-frontmatter
        language: python
        additional_dependencies: ["pyyaml>=6.0"]
        files: ^[0-9]{4}-
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.4"
    hooks:
      - id: bandit
        args: ["--skip", "B101,B404,B603"]

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
